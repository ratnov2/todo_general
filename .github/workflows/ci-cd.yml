name: CI/CD Pipeline

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [backend_updated, frontend_updated, gateway_updated]
  workflow_dispatch: # возможность запускать вручную

env:
  DOMAIN: ${{ secrets.DOMAIN }}
  GIT_USER: ${{ secrets.GIT_USER }}
  GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  IP: ${{ secrets.IP }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set-matrix.outputs.services }}
    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v3
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.GIT_TOKEN }}

      - name: Detect changed services
        id: set-matrix
        run: |
          echo "Checking which services changed..."
          CHANGED_SERVICES=()

          # Проверяем сабмодули
          if git diff --name-only HEAD^ HEAD | grep -q '^gateway/'; then
            CHANGED_SERVICES+=("gateway")
          fi
          if git diff --name-only HEAD^ HEAD | grep -q '^backend/'; then
            CHANGED_SERVICES+=("backend")
          fi
          if git diff --name-only HEAD^ HEAD | grep -q '^frontend/'; then
            CHANGED_SERVICES+=("frontend")
          fi

          # Если ничего не изменилось, билдим всё (опционально)
          if [ ${#CHANGED_SERVICES[@]} -eq 0 ]; then
            CHANGED_SERVICES=("gateway" "backend" "frontend")
          fi

          SERVICES_JSON=$(printf '%s\n' "${CHANGED_SERVICES[@]}" | jq -R . | jq -s .)

          echo "Detected services JSON: $SERVICES_JSON"
          echo "::set-output name=services::$SERVICES_JSON"

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services || '["gateway","backend","frontend"]') }}

    steps:
      - name: Check Docker secrets
        run: |
          echo "DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}"

      - name: Checkout repository with submodules
        uses: actions/checkout@v3
        with:
          submodules: recursive # подтягивает gateway, backend, frontend, main
          fetch-depth: 0
          token: ${{ secrets.GIT_TOKEN }}

      - name: List repository files
        run: ls -R

      - name: Set up Docker
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      # Build & Push образы из подмодулей
      - name: Build and push gateway
        run: |
          docker build --platform linux/amd64 -t kaka22897/todo_gateway:latest -f gateway/Dockerfile gateway
          docker push kaka22897/todo_gateway:latest

      - name: Build and push backend
        run: |
          docker build --platform linux/amd64 -t kaka22897/todo_backend:latest -f backend/Dockerfile backend
          docker push kaka22897/todo_backend:latest

      - name: Build and push frontend
        run: |
          docker build --platform linux/amd64 -t kaka22897/todo_frontend:latest -f frontend/Dockerfile frontend
          docker push kaka22897/todo_frontend:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan ${{ env.IP }} >> ~/.ssh/known_hosts

      - name: Copy .env file
        run: |
          echo "${{ secrets.ENV_FILE }}" | ssh -i ~/.ssh/id_ed25519 root@${{ env.IP }} 'cat > /root/general/.env'

      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/id_ed25519  root@${{ env.IP }} << 'EOF'
          docker network create --driver bridge --attachable shared-network || true
          cd /root/general
          git pull
          docker compose pull
          docker compose down --remove-orphans
          docker compose up --detach

          docker image prune -f || true
          EOF
